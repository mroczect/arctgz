name: Cross‑Platform Tests

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --target ${{ matrix.target }} -- -D warnings

      - name: Build
        run: cargo build --target ${{ matrix.target }} --verbose

      - name: Test
        run: cargo test --target ${{ matrix.target }} --workspace --verbose

  test-32bit:
    strategy:
      matrix:
        include:
          - name: linux-32
            target: i686-unknown-linux-gnu
            os: ubuntu-latest
          - name: windows-32
            target: i686-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux only)
        if: runner.os == 'Linux'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cross (Linux 32‑bit)
        if: matrix.name == 'linux-32'
        run: cross build --target ${{ matrix.target }} --verbose

      - name: Test with cross (Linux 32‑bit)
        if: matrix.name == 'linux-32'
        run: cross test --target ${{ matrix.target }} --workspace --verbose

      - name: Build (Windows 32‑bit) – test not supported
        if: matrix.name == 'windows-32'
        run: cargo build --target ${{ matrix.target }} --verbose
