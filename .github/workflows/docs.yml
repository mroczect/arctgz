name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download latest RawSSG binary
        run: |
          # Ambil tag rilis terbaru dari repositori rawssg
          TAG=$(curl -s https://api.github.com/repos/mroczect/rawssg/releases/latest | jq -r .tag_name)
          echo "Latest RawSSG release: $TAG"
          curl -fsSL "https://github.com/mroczect/rawssg/releases/download/$TAG/rawssg-ubuntu-latest.tar.gz" -o rawssg.tar.gz
          tar -xzf rawssg.tar.gz
          chmod +x rawssg
          sudo mv rawssg /usr/local/bin/

      - name: Configure production base URL
        working-directory: docs
        run: |
          if grep -q 'base_url:' config.yaml; then
            sed -i 's|base_url:.*|base_url: "https://mroczect.github.io/arctgz/"|' config.yaml
          else
            echo 'base_url: "https://mroczect.github.io/arctgz/"' >> config.yaml
          fi
          cat config.yaml

      - name: Build documentation site
        working-directory: docs
        run: rawssg compile

      - name: Build Rust documentation (cargo doc)
        run: cargo doc --no-deps --document-private-items

      - name: Copy cargo doc to dist directory
        run: |
          mkdir -p docs/dist/cargo-doc
          cp -r target/doc/* docs/dist/cargo-doc/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
