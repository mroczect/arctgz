name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download latest RawSSG binary
        run: |
          TAG=$(curl -s https://api.github.com/repos/mroczect/rawssg/releases/latest | jq -r .tag_name)
          echo "Latest RawSSG release: $TAG"
          curl -fsSL "https://github.com/mroczect/rawssg/releases/download/$TAG/rawssg-ubuntu-latest.tar.gz" -o rawssg.tar.gz
          tar -xzf rawssg.tar.gz
          chmod +x rawssg
          sudo mv rawssg /usr/local/bin/

      - name: Configure production base URL
        working-directory: docs
        run: |
          if grep -q 'base_url:' config.yaml; then
            sed -i 's|base_url:.*|base_url: "https://mroczect.github.io/arctgz/"|' config.yaml
          else
            echo 'base_url: "https://mroczect.github.io/arctgz/"' >> config.yaml
          fi
          cat config.yaml

      - name: Build documentation site (RawSSG)
        working-directory: docs
        run: rawssg compile

      - name: Build Rust documentation (cargo doc)
        run: cargo doc --no-deps --document-private-items

      - name: Debug – list cargo doc output
        run: |
          echo "Contents of target/doc:"
          ls -la target/doc/
          echo "Number of files:"
          find target/doc -type f | wc -l

      - name: Remove problematic .lock file
        run: rm -f target/doc/.lock

      - name: Fix permissions for cargo doc
        run: |
          find target/doc -type f -exec chmod 644 {} \;
          find target/doc -type d -exec chmod 755 {} \;

      - name: Copy cargo doc to dist directory
        run: |
          mkdir -p docs/dist/cargo-doc
          cp -r target/doc/* docs/dist/cargo-doc/

      - name: Create redirect from cargo-doc/index.html to crate root
        run: |
          CRATE_NAME=$(grep '^name =' Cargo.toml | head -1 | cut -d '"' -f2)
          cat > docs/dist/cargo-doc/index.html <<EOF
          <!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=${CRATE_NAME}/index.html" />
            </head>
            <body>
              <p>Redirecting to <a href="${CRATE_NAME}/index.html">cargo doc</a>...</p>
            </body>
          </html>
          EOF

      - name: Verify cargo doc was copied
        run: |
          echo "Contents of docs/dist/cargo-doc:"
          ls -la docs/dist/cargo-doc/
          echo "Number of files:"
          find docs/dist/cargo-doc -type f | wc -l
          echo "Index file exists:"
          test -f docs/dist/cargo-doc/index.html && echo "✅ index.html present" || echo "⚠️ index.html missing"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
