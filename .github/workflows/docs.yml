name: Deploy man page to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install groff
        run: |
          sudo apt-get update
          sudo apt-get install -y groff

      - name: Find man page file
        id: manpage
        run: |
          MANFILE=$(find manual/ -maxdepth 1 \( -name "*.7" -o -name "*.1" \) | head -1)
          if [ -z "$MANFILE" ]; then
            echo "::error::No man page found in manual/ (expected *.7 or *.1)"
            exit 1
          fi
          echo "path=$MANFILE" >> $GITHUB_OUTPUT
          echo "name=$(basename "$MANFILE" | cut -d. -f1)" >> $GITHUB_OUTPUT

      - name: Convert man page to HTML
        run: |
          mkdir -p public
          groff -mandoc -Thtml "${{ steps.manpage.outputs.path }}" > public/man-content.html
          cat > public/index.html << 'TEMPLATE'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>arctgz(7) - manual</title>
            <style>
              :root {
                --bg: #fafafa;
                --text: #1a1a1a;
                --code-bg: #eeeeee;
                --border: #cccccc;
                --link: #0057b7;
              }
              @media (prefers-color-scheme: dark) {
                :root {
                  --bg: #111111;
                  --text: #e0e0e0;
                  --code-bg: #2a2a2a;
                  --border: #444444;
                  --link: #7ab8ff;
                }
              }
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
                background: var(--bg);
                color: var(--text);
                max-width: 90ch;
                margin: 2rem auto;
                padding: 0 1.5rem;
                line-height: 1.6;
              }
              a { color: var(--link); text-decoration: none; }
              a:hover { text-decoration: underline; }
              h1, h2, h3 { margin: 1.5rem 0 0.5rem; }
              h1 { font-size: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
              h2 { font-size: 1.5rem; }
              h3 { font-size: 1.2rem; }
              pre, code {
                background: var(--code-bg);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 0.2em 0.4em;
                font-size: 0.95em;
              }
              pre {
                padding: 1rem;
                overflow-x: auto;
              }
              table {
                border-collapse: collapse;
                width: 100%;
                margin: 1rem 0;
              }
              th, td {
                text-align: left;
                padding: 0.5rem 0.75rem;
                border-bottom: 1px solid var(--border);
              }
              .Nd, .Sh, .Ss, .St { /* tambahan dari groff output */ }
              footer {
                margin-top: 3rem;
                padding-top: 1rem;
                border-top: 1px solid var(--border);
                font-size: 0.85rem;
                color: var(--text);
                opacity: 0.7;
              }
            </style>
          </head>
          <body>
            <!--#include file="man-content.html" -->
          </body>
          </html>
          TEMPLATE
          sed -i '/<!--#include file="man-content.html" -->/{
            r public/man-content.html
            d
          }' public/index.html

          rm public/man-content.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
